<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Theo Shell</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="style.css"/>
  </head>
  <body>
    <main id="container">
      <div id="terminal">
        <!-- Terminal Bar -->
        <section id="terminal__bar">
          <div id="bar__buttons">
            <button class="bar__button" id="bar__button--exit">&#10005;</button>
            <button class="bar__button">&#9472;</button>
            <button class="bar__button">&#9723;</button>
          </div>
          <p id="bar__user">theopark@github: ~</p>
        </section>
        <!-- Terminal Body -->
        <section id="terminal__body">
          <div id="terminal__prompt">
            <span id="terminal__prompt--user">theopark@github:</span>
            <span id="terminal__prompt--location">~</span>
            <span id="terminal__prompt--bling"> $ </span>
            <span id="terminal__prompt--command"> Hello! My name is Theo Park, and I am a student at Purdue University studying Comp Sci and Philosophy!</span>
            <span id="terminal__prompt--cursor"></span>
          </div>
        </section>
      </div>
    </main>

  </body>
</html>
